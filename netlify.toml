# Netlify configuration for Orkela Frontend

[build]
  # Comando de build
  command = "npm run build"
  
  # Directorio de salida después del build
  publish = "dist"

# Redirects para SPA (Single Page Application)
# Todas las rutas deben redirigir a index.html para que React Router funcione
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad y caché
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para imágenes
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service Worker sin cache
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
